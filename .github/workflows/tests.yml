name: Python Quality & Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest numpy Pillow types-Pillow

      - name: Run Ruff (Lint & Format)
        run: |
          ruff check . --output-format=github
          ruff format . --check

      - name: Run Mypy (Static Analysis)
        run: mypy . --ignore-missing-imports

      - name: Run Pytest (Golden Tests)
        run: pytest
