name: Ruff Lint & Format
on: 
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      check_mode:
        description: 'Режим проверки'
        required: true
        default: 'check'
        type: choice
        options:
          - check
          - fix
      verbose:
        description: 'Подробный вывод'
        required: false
        default: false
        type: boolean

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Ruff
        run: pip install ruff
      
      - name: Run Ruff linter
        run: |
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.check_mode == 'fix' }}" == "true" ]]; then
            ruff check . --fix
          else
            ruff check . --output-format=github
          fi
      
      - name: Check formatting
        run: |
          if [[ "${{ github.event_name == 'workflow_dispatch' && inputs.check_mode == 'fix' }}" == "true" ]]; then
            ruff format .
          else
            ruff format . --check
          fi
      
      - name: Show detailed errors if any
        if: failure() || (github.event_name == 'workflow_dispatch' && inputs.verbose == true)
        run: |
          echo " Статус проверки:"
          echo ""
          echo "Ошибки линтера:"
          ruff check . --statistics
          echo ""
          echo "Проблемы форматирования:"
          ruff format . --diff || true
          echo ""
          echo "Команды для локального исправления:"
          echo "  ruff check . --fix    # исправить ошибки линтера"
          echo "  ruff format .         # отформатировать код"
